<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Courier FAQ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg:#f6f8fa;--surface:#fff;--surface2:#f0f4f8;
  --border:#d0d7de;--border2:#e8ecf0;
  --text:#1a1f2e;--muted:#636e7b;--muted2:#8b949e;
  --accent:#0969da;--accent-bg:#ddf4ff;
  --orange:#bc4c00;--orange-bg:#fff1e5;
  --red:#cf222e;--red-bg:#ffebe9;
  --purple:#6639ba;--purple-bg:#fbefff;
  --green:#1a7f37;--green-bg:#dafbe1;
  --font:'Inter',sans-serif;
  --radius:8px;--radius-lg:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;position:sticky;top:0;z-index:100;}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.brand-name{font-size:16px;font-weight:700;}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.lang-switcher{display:flex;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px;}
.lang-btn{padding:4px 10px;font-size:12px;font-weight:500;font-family:var(--font);border:none;background:none;cursor:pointer;border-radius:4px;color:var(--muted);transition:all .15s;}
.lang-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.12);}

.search-wrap{max-width:720px;margin:1.25rem auto .75rem;padding:0 1.25rem;}
.search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.65rem 1rem;transition:border-color .15s;}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(9,105,218,.1);}
.search-input{flex:1;border:none;outline:none;font-size:14px;font-family:var(--font);background:none;color:var(--text);}
.search-input::placeholder{color:var(--muted2);}
.search-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0;display:none;}

.main{max-width:720px;margin:0 auto;padding:0 1.25rem 4rem;}

.cat-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.cat-tab{padding:.4rem .85rem;font-size:12px;font-weight:500;font-family:var(--font);border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;color:var(--muted);transition:all .15s;white-space:nowrap;}
.cat-tab:hover{border-color:var(--accent);color:var(--accent);}
.cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

.faq-section{margin-bottom:1.5rem;}
.section-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.65rem;}
.section-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.section-title{font-size:14px;font-weight:600;}
.section-count{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border2);padding:1px 7px;border-radius:10px;}

.faq-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px;overflow:hidden;transition:box-shadow .15s;}
.faq-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;cursor:pointer;gap:1rem;user-select:none;-webkit-tap-highlight-color:transparent;}
.faq-q-text{font-size:14px;font-weight:500;line-height:1.4;flex:1;}
.faq-q-text mark{background:rgba(9,105,218,.12);color:var(--accent);border-radius:2px;padding:0 2px;}
.faq-chevron{color:var(--muted);font-size:11px;transition:transform .2s;flex-shrink:0;}
.faq-item.open .faq-chevron{transform:rotate(180deg);}
.faq-a{display:none;padding:0 1rem .9rem;border-top:1px solid var(--border2);}
.faq-item.open .faq-a{display:block;}
.faq-a-inner{padding-top:.75rem;font-size:13px;color:var(--muted);line-height:1.8;white-space:pre-line;}

.empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-icon{font-size:40px;display:block;margin-bottom:.75rem;}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:.4rem;}

.suggest-wrap{margin-top:2rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center;}
.suggest-title{font-size:14px;font-weight:600;margin-bottom:.35rem;}
.suggest-sub{font-size:12px;color:var(--muted);margin-bottom:1rem;}
.suggest-btn{background:var(--accent);color:#fff;font-family:var(--font);font-size:13px;font-weight:600;padding:.6rem 1.5rem;border:none;border-radius:6px;cursor:pointer;}
.suggest-btn:hover{opacity:.88;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:flex-end;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:540px;}
.modal-title{font-size:16px;font-weight:700;margin-bottom:.35rem;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem;}
.form-label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.04em;}
.form-input,.form-textarea,.form-select{width:100%;border:1px solid var(--border);border-radius:6px;padding:.55rem .75rem;font-size:14px;font-family:var(--font);outline:none;margin-bottom:.85rem;background:var(--surface);color:var(--text);-webkit-appearance:none;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(9,105,218,.1);}
.form-textarea{min-height:90px;resize:vertical;}
.form-row{display:flex;gap:.65rem;}
.form-row>*{flex:1;}
.modal-actions{display:flex;gap:.65rem;margin-top:.25rem;}
.btn-cancel{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;font-weight:500;padding:.65rem;border-radius:6px;cursor:pointer;}
.btn-submit{flex:2;background:var(--accent);color:#fff;border:none;font-family:var(--font);font-size:13px;font-weight:600;padding:.65rem;border-radius:6px;cursor:pointer;}
.btn-submit:disabled{opacity:.5;}
.success-msg{text-align:center;padding:1.5rem 0;}
.success-icon{font-size:44px;display:block;margin-bottom:.75rem;}
.success-title{font-size:16px;font-weight:700;margin-bottom:.4rem;}
.success-sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem;}
.close-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:13px;padding:.6rem 2rem;border-radius:6px;cursor:pointer;}

@media(min-width:600px){
  .modal-overlay{align-items:center;}
  .modal{border-radius:var(--radius-lg);max-height:90vh;overflow-y:auto;}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon">🛵</div>
      <div>
        <div class="brand-name">Courier FAQ</div>
        <div class="brand-sub" id="brandSub">База знаний курьера</div>
      </div>
    </div>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('ru',this)">RU</button>
      <button class="lang-btn" onclick="setLang('pl',this)">PL</button>
      <button class="lang-btn" onclick="setLang('ua',this)">UA</button>
      <button class="lang-btn" onclick="setLang('en',this)">EN</button>
    </div>
  </div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <span>🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Поиск..." oninput="onSearch()">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
</div>

<main class="main">
  <div class="cat-tabs" id="catTabs"></div>
  <div id="faqContent"></div>
  <div class="suggest-wrap">
    <div class="suggest-title" id="suggestTitle">Не нашли ответ?</div>
    <div class="suggest-sub" id="suggestSub">Предложите тему — мы добавим её в FAQ</div>
    <button class="suggest-btn" id="suggestBtn" onclick="openModal()">Предложить тему</button>
  </div>
</main>

<div class="modal-overlay hidden" id="modalOverlay" onclick="bgClose(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div id="modalInner"></div>
  </div>
</div>

const GOOGLE_FORM_URL = ''; // например: 'https://forms.gle/xxxxxxxx'

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
let LANG = localStorage.getItem('faq_lang') || 'ru';
let ACTIVE_CAT = 'all';

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
window.onload = () => {
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === LANG);
  });
  applyUI();
  render();
};

function setLang(lang, btn) {
  LANG = lang;
  localStorage.setItem('faq_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyUI();
  render();
}

function applyUI() {
  const t = T[LANG];
  document.getElementById('brandSub').textContent    = t.brandSub;
  document.getElementById('searchInput').placeholder  = t.search;
  document.getElementById('suggestTitle').textContent = t.suggestTitle;
  document.getElementById('suggestSub').textContent   = t.suggestSub;
  document.getElementById('suggestBtn').textContent   = t.suggestBtn;
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function render() {
  const t = T[LANG];
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const active = FAQ_DATA.filter(f => f.active);

  const filtered = active.filter(f => {
    const cat = (f.cat[LANG] || '').toLowerCase();
    const q   = (f.q[LANG]   || '').toLowerCase();
    const a   = (f.a[LANG]   || '').toLowerCase();
    const matchCat = ACTIVE_CAT === 'all' || cat === ACTIVE_CAT.toLowerCase();
    const matchQ   = !query || q.includes(query) || a.includes(query);
    return matchCat && matchQ;
  });

  // Tabs
  const cats = [...new Set(active.map(f => f.cat[LANG]).filter(Boolean))];
  document.getElementById('catTabs').innerHTML =
    `<button class="cat-tab ${ACTIVE_CAT==='all'?'active':''}" onclick="setCat('all',this)">${t.all}</button>` +
    cats.map(c => {
      const cc = cfg(c);
      return `<button class="cat-tab ${ACTIVE_CAT.toLowerCase()===c.toLowerCase()?'active':''}" onclick="setCat('${c}',this)">${cc.icon} ${c}</button>`;
    }).join('');

  // Content
  const el = document.getElementById('faqContent');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><span class="empty-icon">🔍</span><div class="empty-title">${t.notFound}</div><div>${t.notFoundSub}</div></div>`;
    return;
  }

  const grouped = {};
  filtered.forEach(f => {
    const c = f.cat[LANG] || 'Other';
    if (!grouped[c]) grouped[c] = [];
    grouped[c].push(f);
  });

  el.innerHTML = Object.entries(grouped).map(([cat, items]) => {
    const cc = cfg(cat);
    return `<div class="faq-section">
      <div class="section-header">
        <div class="section-icon" style="background:${cc.bg};color:${cc.color}">${cc.icon}</div>
        <div class="section-title">${cat}</div>
        <div class="section-count">${items.length}</div>
      </div>
      ${items.map(f => {
        const qText = hl(f.q[LANG] || '', query);
        const aText = esc(f.a[LANG] || '');
        return `<div class="faq-item" onclick="toggle(this)">
          <div class="faq-q">
            <div class="faq-q-text">${qText}</div>
            <span class="faq-chevron">▼</span>
          </div>
          <div class="faq-a"><div class="faq-a-inner">${aText}</div></div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function hl(text, q) {
  const e = esc(text);
  if (!q) return e;
  return e.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}
function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function toggle(el) {
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(i => i.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}
function setCat(cat, btn) {
  ACTIVE_CAT = cat;
  render();
}
function onSearch() {
  ACTIVE_CAT = 'all';
  const val = document.getElementById('searchInput').value;
  document.getElementById('searchClear').style.display = val ? 'block' : 'none';
  render();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  render();
}

// MODAL / SUGGEST
// ══════════════════════════════════════════════════════════════
function openModal() {
  if (GOOGLE_FORM_URL) {
    window.open(GOOGLE_FORM_URL, '_blank');
    return;
  }
  const t = T[LANG];
  document.getElementById('modalInner').innerHTML = `
    <div class="modal-title">${t.modalTitle}</div>
    <div class="modal-sub">${t.modalSub}</div>
    <div class="form-row">
      <div><label class="form-label">${t.lName}</label>
        <input class="form-input" id="iName" type="text" placeholder="${t.phName}"></div>
      <div><label class="form-label">${t.lLang}</label>
        <select class="form-select" id="iLang">
          <option value="ru" ${LANG==='ru'?'selected':''}>Русский</option>
          <option value="pl" ${LANG==='pl'?'selected':''}>Polski</option>
          <option value="ua" ${LANG==='ua'?'selected':''}>Українська</option>
          <option value="en" ${LANG==='en'?'selected':''}>English</option>
        </select></div>
    </div>
    <label class="form-label">${t.lTopic}</label>
    <input class="form-input" id="iTopic" type="text" placeholder="${t.phTopic}">
    <label class="form-label">${t.lDetails}</label>
    <textarea class="form-textarea" id="iDetails" placeholder="${t.phDetails}"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">${t.cancel}</button>
      <button class="btn-submit" onclick="submitSuggest()">${t.submit}</button>
    </div>`;
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function submitSuggest() {
  const t = T[LANG];
  const topic = (document.getElementById('iTopic').value || '').trim();
  if (!topic) { document.getElementById('iTopic').style.borderColor='#cf222e'; return; }
  // Если Google Form не подключена — просто показываем успех
  document.getElementById('modalInner').innerHTML = `
    <div class="success-msg">
      <span class="success-icon">✅</span>
      <div class="success-title">${t.successTitle}</div>
      <div class="success-sub">${t.successSub}</div>
      <button class="close-btn" onclick="closeModal()">${t.close}</button>
    </div>`;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}
function bgClose(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
